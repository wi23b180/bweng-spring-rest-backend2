server.port=8081

spring.datasource.url=${DB_URL:jdbc:mariadb://localhost:3307/spring}
spring.datasource.username=${DB_USER:springuser}
spring.datasource.password=${DB_PASSWORD:springpw}
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=${APP_JWT_SECRET:01234567890123456789012345678901}
app.jwt.expiration-seconds=${APP_JWT_EXPIRATION_SECONDS:3600}

app.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
app.minio.access-key=${MINIO_ACCESS_KEY:minioadmin}
app.minio.secret-key=${MINIO_SECRET_KEY:minioadmin123}
app.minio.bucket=${MINIO_BUCKET:files}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB